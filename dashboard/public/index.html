<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shitflix Dashboard</title>
    <link rel="icon" type="image/x-icon" href="/icons/favicon.png">
    <script src="https://unpkg.com/htmx.org"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body hx-headers='{"X-Requested-With": "XMLHttpRequest"}'>
<div class="container">
    <div id="header-area" hx-get="/partials/header.html" hx-trigger="load"></div>
    <div id="search-area" hx-get="/partials/search-form.html" hx-trigger="load"></div>

    <div id="download-result-container"></div>

    <div class="loading" style="display:none;">
        ⏳ Searching...
    </div>

    <div id="search-results-container">
        <!-- Results will be displayed here -->
    </div>
</div>

<!-- Modals -->
<div id="preloader-modal" class="modal" hx-get="/partials/modals/preloader.html" hx-trigger="load"></div>
<div id="download-modal" class="modal" hx-get="/partials/modals/download.html" hx-trigger="load"></div>
<div id="wishlist-modal" class="modal" hx-get="/partials/modals/wishlist.html" hx-trigger="load"></div>
<div id="banlist-modal" class="modal" hx-get="/partials/modals/banlist.html" hx-trigger="load"></div>
<div id="sync-modal" class="modal" hx-get="/partials/modals/sync.html" hx-trigger="load"></div>

<script type="module" src="scripts/main.js"></script>
</body>
</html>
